// ================================================================
// 全局状态
// ================================================================
var selectedNodeId = null;
var selectedBillId = null;
var treeExpanded = {};

function initExpanded() {
  treeExpanded['root'] = true;
  treeExpanded['root-0'] = true; // 标段一展开
  treeExpanded['root-1'] = false; // 标段二折叠
  // 展开标段一内的楼栋
  treeExpanded['root-0-0'] = true; // 1#楼展开
  treeExpanded['root-0-1'] = false; // 2#楼折叠
  treeExpanded['root-0-2'] = false; // 地下室折叠
}
initExpanded();

// ================================================================
// 渲染项目结构树
// ================================================================
function renderTree() {
  var el = document.getElementById('projectTree');
  el.innerHTML = renderNode(projectData, 'root', 0);
}

function countLeaves(node) {
  if (!node.children) return 1;
  var total = 0;
  node.children.forEach(function(c) { total += countLeaves(c); });
  return total;
}

function renderNode(node, id, depth) {
  var hasChildren = node.children && node.children.length > 0;
  var exp = treeExpanded[id] || false;
  var active = selectedNodeId === id;
  var depthLevel = id.split('-').length - 1;

  // 计数
  var leafCount = 0;
  function count(n) {
    if (!n.children) { leafCount++; return; }
    n.children.forEach(count);
  }
  if (hasChildren) node.children.forEach(count);

  // 徽章
  var badge = null;
  if (depthLevel === 1) badge = { cls: 'section', txt: node.children.length + '个楼栋' };
  if (depthLevel === 2) badge = { cls: 'section', txt: node.children.length + '个专业' };
  if (depthLevel === 3) badge = null; // 专业下的分部
  if (depthLevel === 4) badge = { cls: 'item', txt: leafCount + '条' };
  if (!hasChildren) badge = { cls: 'item', txt: '1条' };

  // 专业标签
  var specTag = '';
  if (node.spec && node.isSpec) {
    specTag = '<span class="spec-tag ' + node.spec + '">' +
      ({土建:'土建',装修:'装修',安装:'安装',措施:'措施',其他:'其他'})[node.spec] + '</span>';
  }

  // 费用类别标签
  var costTag = '';
  if (node.isCost) {
    var costLabel = node.spec === '措施' ? '措施费' : (node.spec === '其他' ? '其他费' : '');
    if (costLabel) costTag = '<span class="cost-category ' + (node.spec === '措施' ? '措施费' : '其他费') + '">' + costLabel + '</span>';
  }

  var toggleIcon = hasChildren
    ? '<div class="tree-toggle' + (exp ? ' expanded' : '') + '" onclick="event.stopPropagation(); toggleNode(\'' + id + '\')"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>'
    : '<div class="tree-toggle empty"></div>';

  var extraClass = node.isSpec ? ' spec-row ' + (node.spec || '') : '';

  var html = '<div class="tree-node-item">' +
    '<div class="tree-row' + extraClass + (active ? ' active' : '') + '" onclick="onTreeSelect(\'' + id + '\', this)">' +
      toggleIcon +
      '<div class="tree-icon">' + (node.icon || (depthLevel === 1 ? '📦' : '▸')) + '</div>' +
      '<div class="tree-label">' +
        '<div class="tree-label-name">' + node.name + specTag + costTag + '</div>' +
        (node.amount ? '<div class="tree-label-sub">' + node.amount + '</div>' : '') +
      '</div>' +
      (badge ? '<span class="tree-count ' + badge.cls + '">' + badge.txt + '</span>' : '') +
    '</div>';

  if (hasChildren && exp) {
    html += '<div class="tree-children">';
    node.children.forEach(function(child, idx) {
      html += renderNode(child, id + '-' + idx, depth + 1);
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function toggleNode(id) {
  treeExpanded[id] = !treeExpanded[id];
  renderTree();
}

function onTreeSelect(id, el) {
  selectedNodeId = id;
  selectedBillId = null;
  document.querySelectorAll('.tree-row').forEach(function(r) { r.classList.remove('active'); });
  el.classList.add('active');
  renderBillList();
  renderQuotaPanel();
}

function flattenItems(node, ancestors) {
  if (!node.children) return [{ obj: node, path: ancestors }];
  var result = [];
  node.children.forEach(function(child) {
    result = result.concat(flattenItems(child, ancestors.concat(node.name)));
  });
  return result;
}

function getCurrentItems() {
  if (!selectedNodeId || selectedNodeId === 'root') {
    var all = [];
    projectData.children.forEach(function(bg) {
      bg.children.forEach(function(dw) {
        dw.children.forEach(function(spec) {
          if (spec.children) {
            spec.children.forEach(function(div) {
              if (div.children) {
                div.children.forEach(function(item) {
                  all.push({ obj: item, path: [bg.name, dw.name, spec.name, div.name] });
                });
              }
            });
          }
        });
      });
    });
    return all;
  }

  var parts = selectedNodeId.split('-');
  var current = projectData;
  for (var i = 1; i < parts.length; i++) {
    if (!current || !current.children) return [];
    current = current.children[parseInt(parts[i])];
  }
  if (!current) return [];

  // 叶子节点（清单）
  if (!current.children) return [{ obj: current, path: [] }];

  // 有子节点，收集所有叶子清单
  var all = [];
  function collect(n, path) {
    if (!n.children) {
      all.push({ obj: n, path: path });
      return;
    }
    n.children.forEach(function(c) { collect(c, path.concat(n.name)); });
  }
  collect(current, []);
  return all;
}

function renderBillList() {
  var filter = document.getElementById('filterInput').value.trim().toLowerCase();
  var tbody = document.getElementById('billTableBody');
  var items = getCurrentItems();

      var b = item.obj;
      return b.name.toLowerCase().indexOf(filter) !== -1 ||
             b.code.toLowerCase().indexOf(filter) !== -1 ||
             (b.feature && b.feature.toLowerCase().indexOf(filter) !== -1);
    });

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--color-text-muted)">无匹配结果</td></tr>';

  var html = '';
  items.forEach(function(item, idx) {

    html += '<tr class="bill-row' + (selected ? ' selected' : '') + '" data-id="' + b.id + '" onclick="onBillSelect(' + b.id + ')">' +

      '<td style="text-align:center;color:var(--color-text-muted);font-size:10px">' + (idx + 1) + '</td>' +
      '<td class="code-cell">' + b.code + '</td>' +
      '<td style="font-weight:500;font-size:13px">' + b.name + '</td>' +
      '<td class="spec-cell" style="text-align:center"><span class="spec-tag ' + (specClassMap[spec] || '') + '">' + (specDisplay[spec] || spec || '') + '</span></td>' +
      '<td style="text-align:center;font-size:12px">' + (b.unit || '—') + '</td>' +
      '<td style="text-align:right;font-family:\'JetBrains Mono\',monospace;font-size:12px">' + (b.qty || 0).toLocaleString('zh-CN', {minimumFractionDigits: (b.unit === 'm³' || b.unit === 'm²' || b.unit === 'm' || b.unit === 't') ? 3 : 2}) + '</td>' +
      '<td style="text-align:right;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:600">¥ ' + (b.price || 0).toFixed(2) + '</td>' +
      '<td style="text-align:right;font-family:\'JetBrains Mono\',monospace;font-size:12px">¥ ' + amt.toLocaleString('zh-CN', {minimumFractionDigits:2}) + '</td>' +
      '<td style="text-align:center">' +
        '<button onclick="event.stopPropagation(); aiAction(\'match\')" style="background:none;border:none;cursor:pointer;font-size:12px" title="AI匹配定额">🤖</button>' +
      '</td>' +
    '</tr>';
  });

  tbody.innerHTML = html;
  updateSummary(items);
}

function onBillSelect(id) {
  selectedBillId = id;
  renderBillList();
  renderQuotaPanel();
}

function updateSummary(items) {
  if (!items || !items.length) {
    document.getElementById('sumNode').textContent = '全部';
    document.getElementById('sumCount').textContent = '—';
    document.getElementById('sumQuota').textContent = '—';
    document.getElementById('sumAmt').textContent = '—';
    document.getElementById('sumTax').textContent = '—';
    return;
  }
  var total = 0;
  items.forEach(function(item) { total += item.obj.qty * item.obj.price; });
  var quotaCount = Math.round(items.length * 0.92);
  document.getElementById('sumNode').textContent = selectedNodeId && selectedNodeId !== 'root' ? selectedNodeId.split('-').slice(-1)[0] : '全部';
  document.getElementById('sumCount').textContent = items.length + ' 项';
  document.getElementById('sumQuota').textContent = quotaCount + ' 项';
  document.getElementById('sumAmt').textContent = '¥ ' + total.toLocaleString('zh-CN', {minimumFractionDigits:2});
  document.getElementById('sumTax').textContent = '¥ ' + (total * 1.09).toLocaleString('zh-CN', {minimumFractionDigits:2});
}

function toggleSelectAll() {
  var checked = document.querySelector('th input[type=checkbox]').checked;
  document.querySelectorAll('#billTableBody input[type=checkbox]').forEach(function(cb) { cb.checked = checked; });
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}
