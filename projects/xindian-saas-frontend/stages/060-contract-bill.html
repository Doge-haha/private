<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合同清单 - 新点 SaaS 造价系统</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body { overflow: hidden; }
  .contract-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  /* 数据血缘条 */
  .lineage { display: flex; align-items: center; gap: 0; padding: 8px 20px; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; flex-shrink: 0; }
  .lin-step { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all .15s; }
  .lin-step:hover { background: #EEF2FF; }
  .lin-step.active { background: #EEF2FF; color: #4338CA; }
  .lin-current { background: #FEF9C3; border: 1px solid #F59E0B; color: #92400E; }
  .lin-arrow { color: #CBD5E1; font-size: 14px; }
  /* 合同履约状态区 */
  .contract-status-row { display: flex; gap: 12px; padding: 14px 20px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); flex-shrink: 0; overflow-x: auto; }
  /* 单合同状态卡 */
  .status-card { flex: 1; min-width: 280px; border: 1.5px solid var(--color-border); border-radius: 12px; padding: 14px 16px; background: white; cursor: pointer; transition: all .15s; position: relative; overflow: hidden; }
  .status-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 12px 0 0 12px; }
  .status-card.active { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(30,158,130,.12); }
  .status-card[data-status="constructing"]::before { background: #3B82F6; }
  .status-card[data-status="completed"]::before { background: #10B981; }
  .status-card[data-status="disputed"]::before { background: #F59E0B; }
  .status-card:hover { border-color: var(--color-primary-light); }
  .sc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .sc-title { font-size: 13px; font-weight: 700; color: var(--color-text-primary); line-height: 1.3; }
  .sc-meta { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
  .sc-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .badge-constructing { background: #DBEAFE; color: #1E40AF; }
  .badge-completed { background: #D1FAE5; color: #065F46; }
  .badge-disputed { background: #FEF3C7; color: #92400E; }
  /* 进度条 */
  .sc-progress { margin-bottom: 10px; }
  .sc-progress-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .sc-progress-label { color: var(--color-text-secondary); }
  .sc-progress-pct { font-weight: 700; color: var(--color-text-primary); }
  .sc-bar { height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
  .sc-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .sc-bar-fill.blue { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
  .sc-bar-fill.green { background: linear-gradient(90deg, #10B981, #34D399); }
  .sc-bar-fill.orange { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
  /* 合同指标 */
  .sc-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .sc-metric { display: flex; flex-direction: column; gap: 1px; }
  .sc-metric-label { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .04em; }
  .sc-metric-val { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .sc-metric-val.primary { color: var(--color-primary); }
  .sc-metric-val.warning { color: #F59E0B; }
  /* 变更指示 */
  .sc-changes { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #92400E; background: #FEF3C7; padding: 2px 6px; border-radius: 6px; }
  /* 工作区 */
  .workspace { display: flex; flex: 1; overflow: hidden; }
  /* 主表 */
  .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--color-border); }
  .toolbar { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-bottom: 1px solid var(--color-border); background: var(--color-surface-raised); flex-shrink: 0; }
  .divider { width: 1px; height: 14px; background: var(--color-border); margin: 0 2px; }
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; min-width: 800px; border-collapse: collapse; }
  th { position: sticky; top: 0; z-index: 2; background: #F8FAFC; font-size: 11px; font-weight: 600; color: var(--color-text-secondary); white-space: nowrap; text-align: left; padding: 5px 8px; }
  td { padding: 4px 8px; border-bottom: 1px solid #F1F5F9; font-size: 12px; vertical-align: middle; }
  .row-hl:hover td { background: #FAFBFF; }
  .row-hl.sel td { background: var(--color-primary-light) !important; }
  .code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--color-text-secondary); }
  .num { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 500; }
  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .b-normal { background: #D1FAE5; color: #065F46; }
  .b-changed { background: #FEF3C7; color: #92400E; }
  .b-new { background: #DBEAFE; color: #1E40AF; }
  /* 明细面板 */
  .detail-panel { width: 380px; flex-shrink: 0; overflow-y: auto; background: var(--color-bg); display: flex; flex-direction: column; }
  .detail-hdr { padding: 14px 16px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); flex-shrink: 0; }
  .detail-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .detail-sub { font-size: 11px; color: var(--color-text-muted); }
  /* 合同聚合指标 */
  .contract-summary { padding: 14px 16px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); flex-shrink: 0; }
  .cs-title { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  .cs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cs-card { background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: 8px; padding: 10px 12px; }
  .cs-label { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
  .cs-val { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .cs-val.primary { color: var(--color-primary); }
  .cs-val.red { color: #EF4444; }
  .cs-val.green { color: #10B981; }
  .cs-val.orange { color: #F59E0B; }
  /* 变更单列表 */
  .change-list { padding: 12px 16px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); flex-shrink: 0; }
  .cl-title { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .cl-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 6px; margin-bottom: 5px; font-size: 11px; }
  .cl-item:last-child { margin-bottom: 0; }
  .cl-icon { font-size: 14px; flex-shrink: 0; }
  .cl-info { flex: 1; }
  .cl-header { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
  .cl-id { font-weight: 700; background: #FEF3C7; color: #92400E; padding: 1px 5px; border-radius: 4px; font-size: 10px; }
  .cl-type { font-size: 10px; color: var(--color-text-muted); }
  .cl-reason { color: #78350F; font-size: 11px; line-height: 1.4; }
  .cl-amt { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #92400E; white-space: nowrap; }
  /* 汇总栏 */
  .sum-bar { display: flex; align-items: center; gap: 16px; padding: 7px 14px; background: var(--color-surface); border-top: 1px solid var(--color-border); flex-shrink: 0; flex-wrap: wrap; }
  .sum-item { display: flex; flex-direction: column; gap: 1px; }
  .sum-item .lbl { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .04em; }
  .sum-item .val { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .sum-item .val.primary { color: var(--color-primary); font-size: 15px; }
  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.75); color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; z-index: 9999; pointer-events: none; animation: fadeUp .3s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  /* AI工具条 */
  .ai-toolbar { display: flex; align-items: center; gap: 8px; padding: 7px 20px; background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 100%); border-bottom: 1px solid #E0E7FF; flex-shrink: 0; }
  .ai-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: white; border: 1px solid #C7D2FE; border-radius: 20px; font-size: 12px; color: #4338CA; cursor: pointer; white-space: nowrap; }
  .ai-chip:hover { background: #EEF2FF; }
</style>
</head>

        </div>
      </div>
    </div>
  </div>
</div>

// ================================================================
// 全局状态
// ================================================================
var activeId = 'HT-2026-0418';
var selectedBillId = null;
var showChangedOnly = false;

// ================================================================
// 工具
// ================================================================
var fmt = function(n) {
  if (!n && n !== 0) return '—';
  return '¥ ' + n.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
};
var qty = function(n) {
  return n.toLocaleString('zh-CN', {minimumFractionDigits:3});
};
function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}
function aiAction(action) {
  var m = {compare:'📊 正在对比合同清单与控制价差异…', risk:'⚠️ 正在执行履约风险检测…', change:'📝 正在执行变更漏项检测…'};
  showToast(m[action] || '处理中…');
}
function toggleChanged() { showChangedOnly = !showChangedOnly; renderBill(); }

// ================================================================
// 渲染合同状态卡（履约追踪核心）
// ================================================================
function renderContractStatus() {
  var el = document.getElementById('contractStatusRow');
  var html = '';
  contracts.forEach(function(c) {
    var isActive = c.id === activeId;
    var statusLabel = {constructing:'🚧 施工中', completed:'✅ 竣工', disputed:'⚠️ 争议'}[c.status];
    var statusCls = {constructing:'badge-constructing', completed:'badge-completed', disputed:'badge-disputed'}[c.status];
    var barColor = {constructing:'blue', completed:'green', disputed:'orange'}[c.status];
    var progressColor = {constructing:'blue', completed:'green', disputed:'orange'}[c.status];
    var changeAmt = 0;
    c.changeOrders.forEach(function(o) { changeAmt += o.total; });
    var contractRatio = ((c.contractAmt / c.ctrlTotal - 1) * 100).toFixed(1);
    html += '<div class="status-card' + (isActive ? ' active' : '') + '" data-status="' + c.status + '" onclick="selectContract(\'' + c.id + '\')">' +
      '<div class="sc-header">' +
        '<div>' +
          '<div class="sc-title">' + c.section + '</div>' +
          '<div class="sc-meta">' + c.id + ' · ' + c.contractor + ' · ' + c.signDate + '</div>' +
        '</div>' +
        '<span class="sc-badge ' + statusCls + '">' + statusLabel + '</span>' +
      '</div>' +
      '<div class="sc-progress">' +
        '<div class="sc-progress-header">' +
          '<span class="sc-progress-label">履约进度</span>' +
          '<span class="sc-progress-pct">' + c.progress + '%</span>' +
        '</div>' +
        '<div class="sc-bar"><div class="sc-bar-fill ' + progressColor + '" style="width:' + c.progress + '%"></div></div>' +
      '</div>' +
      '<div class="sc-metrics">' +
        '<div class="sc-metric">' +
          '<div class="sc-metric-label">累计完成产值</div>' +
          '<div class="sc-metric-val primary">' + fmt(c.completedAmt) + '</div>' +
        '</div>' +
        '<div class="sc-metric">' +
          '<div class="sc-metric-label">累计支付</div>' +
          '<div class="sc-metric-val">' + fmt(c.paidAmt) + '</div>' +
        '</div>' +
        '<div class="sc-metric">' +
          '<div class="sc-metric-label">变更累计</div>' +
          '<div class="sc-metric-val warning">' + fmt(changeAmt) + '</div>' +
        '</div>' +
      '</div>' +
      (c.changeOrders.length > 0 ? '<div class="sc-changes">📋 ' + c.changeOrders.length + '份变更单 · 累计 ' + fmt(changeAmt) + '</div>' : '') +
    '</div>';
  });
  el.innerHTML = html;
}

function selectContract(id) {
  activeId = id;
  selectedBillId = null;
  renderContractStatus();
  renderDetail();
  renderBill();
}

// ================================================================
// 渲染明细面板
// ================================================================
function getActive() { return contracts.find(function(c) { return c.id === activeId; }); }

function renderDetail() {
  var c = getActive();
  if (!c) return;

  document.getElementById('dCode').textContent = c.id;
  document.getElementById('dName').textContent = c.section + ' · ' + c.contractor;

  var changeAmt = 0;
  c.changeOrders.forEach(function(o) { changeAmt += o.total; });
  var pendingAmt = c.completedAmt - c.paidAmt;
  var progressDiff = c.contractAmt - c.completedAmt;

  document.getElementById('csGrid').innerHTML =
    '<div class="cs-card"><div class="cs-label">签约合同价</div><div class="cs-val primary">' + fmt(c.contractAmt) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">较控制价</div><div class="cs-val ' + (contractRatio(c, c.ctrlTotal) < 0 ? 'green' : 'red') + '">' + contractRatio(c, c.ctrlTotal) + '%</div></div>' +
    '<div class="cs-card"><div class="cs-label">累计完成产值</div><div class="cs-val primary">' + fmt(c.completedAmt) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">剩余产值</div><div class="cs-val">' + fmt(Math.max(0, progressDiff)) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">累计支付</div><div class="cs-val">' + fmt(c.paidAmt) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">待支付</div><div class="cs-val orange">' + fmt(Math.max(0, pendingAmt)) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">变更累计</div><div class="cs-val orange">' + fmt(changeAmt) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">当前合同额</div><div class="cs-val">' + fmt(c.contractAmt + changeAmt) + '</div></div>';

  // 变更单列表
  var clEl = document.getElementById('changeList');
  if (c.changeOrders.length === 0) {
    clEl.innerHTML = '<div style="font-size:12px;color:var(--color-text-muted);text-align:center;padding:12px">暂无变更单据</div>';
  } else {
    var h = '';
    c.changeOrders.forEach(function(o) {
      var icon = {现场签证:'📝', 设计变更:'📐', 材料调差:'📈'}[o.type] || '📋';
      h += '<div class="cl-item">' +
        '<div class="cl-icon">' + icon + '</div>' +
        '<div class="cl-info">' +
          '<div class="cl-header">' +
            '<span class="cl-id">' + o.id + '</span>' +
            '<span class="cl-type">' + o.type + ' · ' + o.date + '</span>' +
          '</div>' +
          '<div class="cl-reason">' + o.reason + '</div>' +
        '</div>' +
        '<div class="cl-amt">' + fmt(o.total) + '</div>' +
      '</div>';
    });
    clEl.innerHTML = h;
  }
}

function contractRatio(c, ctrlTotal) {
  return ((c.contractAmt / ctrlTotal - 1) * 100).toFixed(1);
}

// ================================================================
// 渲染清单表
// ================================================================
function renderBill() {
  var c = getActive();
  if (!c) return;
  var filter = document.getElementById('filterIn').value.trim().toLowerCase();
  var bills = c.bills;
  if (filter) {
    bills = bills.filter(function(b) {
      return b.name.toLowerCase().indexOf(filter) !== -1 || b.billCode.toLowerCase().indexOf(filter) !== -1;
    });
  }
  if (showChangedOnly) {
    bills = bills.filter(function(b) { return b.changes.length > 0; });
  }
  var tbody = document.getElementById('billBody');
  if (!bills.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--color-text-muted)">无匹配结果</td></tr>';
    updateSum([]);
    return;
  }
  var h = '';
  bills.forEach(function(b, i) {
    var lastChange = b.changes.length > 0 ? b.changes[b.changes.length - 1] : null;
    var amt = b.contractPrice * b.qty;
    var cls = 'row-hl' + (selectedBillId === b.id ? ' sel' : '');
    h += '<tr class="' + cls + '" onclick="selectBill(' + b.id + ')">' +
      '<td style="text-align:center;color:var(--color-text-muted);font-size:10px">' + (i+1) + '</td>' +
      '<td class="code">' + b.billCode + '</td>' +
      '<td><div style="font-weight:500;margin-bottom:1px">' + b.name + '</div><div style="font-size:10px;color:var(--color-text-muted)">' + b.location + ' · ' + b.spec + '</div></td>' +
      '<td style="text-align:center;font-size:11px">' + b.unit + '</td>' +
      '<td class="num" style="color:var(--color-primary)">' + fmt(b.contractPrice) + '</td>' +
      '<td class="num">' + qty(b.qty) + '</td>' +
      '<td class="num" style="font-weight:700">' + fmt(amt) + '</td>' +
      '<td style="text-align:center"><span class="badge ' + (b.changes.length > 0 ? 'b-changed' : 'b-normal') + '">' + (b.changes.length > 0 ? '🔄 ' + b.changes.length + '次' : '✅ 无') + '</span></td>' +
      '<td class="num" style="color:' + (lastChange ? '#7C3AED' : 'var(--color-text-muted)') + '">' + (lastChange ? fmt(lastChange.newPrice) : '—') + '</td>' +
    '</tr>';
  });
  tbody.innerHTML = h;
  updateSum(bills);
}

function updateSum(bills) {
  var c = getActive();
  if (!bills.length) {
    document.getElementById('sumBar').innerHTML = '<div class="sum-item"><div class="lbl">当前合同</div><div class="val">—</div></div>';
    return;
  }
  var listTotal = 0, changeAmt = 0;
  bills.forEach(function(b) {
    listTotal += b.contractPrice * b.qty;
    if (b.changes.length > 0) {
      var last = b.changes[b.changes.length - 1];
      if (last.newPrice !== last.oldPrice) {
        changeAmt += (last.newPrice - last.oldPrice) * b.qty;
      }
    }
  });
  var measureFee = listTotal * 0.085;
  var taxRate = 0.09;
  var taxable = listTotal + measureFee + changeAmt;
  var tax = taxable * taxRate / (1 + taxRate);
  var contractTotal = listTotal + measureFee + changeAmt + tax;
  document.getElementById('sumBar').innerHTML =
    '<div class="sum-item"><div class="lbl">清单小计</div><div class="val">' + fmt(listTotal) + '</div></div>' +
    '<div class="sum-item"><div class="lbl">措施费</div><div class="val">' + fmt(measureFee) + '</div></div>' +
    '<div class="sum-item"><div class="lbl">变更调增</div><div class="val" style="color:#F59E0B">' + fmt(changeAmt) + '</div></div>' +
    '<div class="sum-item"><div class="lbl">税金(9%)</div><div class="val">' + fmt(tax) + '</div></div>' +
    '<div class="sum-item"><div class="lbl">合同价合计</div><div class="val primary">' + fmt(contractTotal) + '</div></div>' +
    '<div class="sum-item"><div class="lbl">当前合同额</div><div class="val primary">' + fmt(contractTotal) + '</div></div>';
}

function selectBill(id) {
  selectedBillId = id;
  renderBill();
  // 更新明细面板显示选中项的四价
  var c = getActive();
  var b = c.bills.find(function(x) { return x.id === id; });
  if (!b) return;
  document.getElementById('dCode').textContent = b.billCode;
  document.getElementById('dName').textContent = b.name + ' · ' + b.location + ' · ' + b.spec;
  // 变更单指标简略显示
  var last = b.changes.length > 0 ? b.changes[b.changes.length - 1] : null;
  document.getElementById('csGrid').innerHTML =
    '<div class="cs-card"><div class="cs-label">签约单价</div><div class="cs-val primary">' + fmt(b.contractPrice) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">合同工程量</div><div class="cs-val">' + qty(b.qty) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">合同合价</div><div class="cs-val">' + fmt(b.contractPrice * b.qty) + '</div></div>' +
    '<div class="cs-card"><div class="cs-label">变更状态</div><div class="cs-val ' + (last ? 'orange' : '') + '">' + (last ? '已变更' : '无变更') + '</div></div>' +
    (last ? '<div class="cs-card"><div class="cs-label">变更后单价</div><div class="cs-val orange">' + fmt(last.newPrice) + '</div></div>' : '') +
    (last ? '<div class="cs-card"><div class="cs-label">变更单号</div><div class="cs-val">' + last.id + '</div></div>' : '') +
    '<div class="cs-card"><div class="cs-label">清单编码</div><div class="cs-val" style="font-size:12px">' + b.billCode + '</div></div>';
  if (last) {
    var ratio = (((last.newPrice / last.oldPrice - 1) * 100).toFixed(1));
    document.getElementById('changeList').innerHTML = '<div class="cl-item"><div class="cl-icon">📋</div><div class="cl-info"><div class="cl-header"><span class="cl-id">' + last.id + '</span><span class="cl-type">' + last.type + ' · ' + last.date + '</span></div><div class="cl-reason">单价从 ' + fmt(last.oldPrice) + ' 调整为 ' + fmt(last.newPrice) + '（变化率 ' + ratio + '%）</div></div></div>';
  } else {
    document.getElementById('changeList').innerHTML = '<div style="font-size:12px;color:var(--color-text-muted);text-align:center;padding:12px">该清单项无变更记录，执行原合同单价</div>';
  }
}

// ================================================================
// 启动
// ================================================================
renderContractStatus();
renderDetail();
renderBill();
</script>
